<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - MindMate</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="auth-body">
  <div class="auth-container">
    <h2>Login to MindMate</h2>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('login') }}">
      <input type="email" name="email" placeholder="Email" required>
      <div class="password-wrapper">
  <input type="password" name="password" id="login-password" placeholder="Password" required>
  <span class="toggle-password" onclick="togglePassword('login-password', this)">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="#555" stroke-width="2"/>
    <circle cx="12" cy="12" r="3" stroke="#555" stroke-width="2"/>
  </svg>
</span>
</div>
      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
  </div>
  <script>
function togglePassword(id, el) {
  const input = document.getElementById(id);

  if (input.type === "password") {
    input.type = "text";
    el.innerHTML = `
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M17.94 17.94A10.94 10.94 0 0112 19c-7 0-11-7-11-7a21.77 21.77 0 015.06-5.94M9.9 4.24A10.94 10.94 0 0112 5c7 0 11 7 11 7a21.77 21.77 0 01-4.06 5.94M1 1l22 22" stroke="#555" stroke-width="2"/>
      </svg>
    `;
  } else {
    input.type = "password";
    el.innerHTML = `
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="#555" stroke-width="2"/>
        <circle cx="12" cy="12" r="3" stroke="#555" stroke-width="2"/>
      </svg>
    `;
  }
}
</script>
</body>
</html>
