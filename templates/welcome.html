<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome - MindMate</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="welcome-body">

  <div class="welcome-container">
    <div class="welcome-message">
      Your safe space to reflect, heal, and grow
    </div>
    <p style="margin-top: 12px; opacity: 0.8;">
  A calm space built just for you.
</p>
    <button class="get-started-btn">Get Started</button>
    
  </div>

  <!-- Login Popup -->
  <div class="popup-overlay" id="login-popup">
    <div class="popup-box">
      <button class="close-btn" onclick="togglePopup('login-popup')">×</button>
      <h2>Login to MindMate</h2>
      <form method="POST" action="/login">
        <input type="email" name="email" placeholder="Email" required>
        <div class="password-wrapper">
  <input type="password" name="password" id="login-password" placeholder="Password" required>
  <span class="toggle-password" onclick="togglePassword('login-password', this)">
  <svg class="eye-icon" viewBox="0 0 24 24">
    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
    <circle cx="12" cy="12" r="3"/>
  </svg>
</span>
</div>
        <button type="submit">Login</button>
      </form>
      <p>Don't have an account? <a href="#" onclick="switchPopup('login-popup', 'register-popup')">Register here</a></p>
    </div>
  </div>

  <!-- Register Popup -->
  <div class="popup-overlay" id="register-popup">
    <div class="popup-box">
      <button class="close-btn" onclick="togglePopup('register-popup')">×</button>
      <h2>Create Your Account</h2>
      <form method="POST" action="/register">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <div class="password-wrapper">
  <input type="password" name="password" id="register-password" placeholder="Password" required>
  <span class="toggle-password" onclick="togglePassword('register-password', this)">👁</span>
</div>
        <button type="submit">Register</button>
      </form>
      <p>Already have an account? <a href="#" onclick="switchPopup('register-popup', 'login-popup')">Login here</a></p>
    </div>
  </div>

  <footer class="footer">
    © 2025 MindMate — Your Personal Mental Wellness Space
  </footer>

  <!-- JavaScript -->
  <script>
    function togglePopup(id) {
      const popup = document.getElementById(id);
      popup.style.display = popup.style.display === "flex" ? "none" : "flex";
    }

    function switchPopup(hideId, showId) {
      document.getElementById(hideId).style.display = "none";
      document.getElementById(showId).style.display = "flex";
    }

    document.querySelector(".get-started-btn").addEventListener("click", function (e) {
      e.preventDefault();
      togglePopup("login-popup");
    });
    function togglePassword(id, el) {
  const input = document.getElementById(id);

  if (input.type === "password") {
    input.type = "text";
    el.innerHTML = `
      <svg class="eye-icon" viewBox="0 0 24 24">
        <path d="M17.94 17.94A10.94 10.94 0 0112 19c-7 0-11-7-11-7a21.77 21.77 0 015.06-5.94M9.9 4.24A10.94 10.94 0 0112 5c7 0 11 7 11 7a21.77 21.77 0 01-4.06 5.94M1 1l22 22"/>
      </svg>
    `;
  } else {
    input.type = "password";
    el.innerHTML = `
      <svg class="eye-icon" viewBox="0 0 24 24">
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    `;
  }
}
  </script>

</body>
</html>
